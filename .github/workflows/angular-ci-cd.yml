name: Angular CI/CD

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Build Angular Application
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        node-version: [24.0.0]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'src/client/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: ./src/client

      - name: Build Angular application
        run: npm run build -- --base-href=/aspnet-jwt-auth/
        working-directory: ./src/client

      # - name: Run tests
      #   run: npm run test -- --watch=false --browsers=ChromeHeadless
      #   working-directory: ./src/client
      #   continue-on-error: true

      - name: Create zip archive
        run: |
          cd src/client/dist
          zip -r ../angular-build.zip .
          cd ../../..
        shell: bash

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: angular-build
          path: src/client/angular-build.zip
          retention-days: 30
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./src/client/dist
          force_orphan: true
          # cname: your-domain.com  # Uncomment and replace with your domain if using custom domain
