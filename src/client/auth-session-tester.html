<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Session Tester</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-bg-primary: #1e1e1e;
            --color-bg-secondary: #2d2d2d;
            --color-text-primary: #e0e0e0;
            --color-text-secondary: #999;
            --color-border: #3d3d3d;
            --color-success: #5DCAA5;
            --color-error: #F0997B;
            --color-warning: #FAC775;
        }

        body {
            background: var(--color-bg-primary);
            color: var(--color-text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        /* Top bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: var(--color-bg-secondary);
            padding: 15px 20px;
            border-radius: 8px;
            border: 1px solid var(--color-border);
        }

        .top-bar h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .top-bar-controls {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .url-input-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .url-input-group label {
            font-size: 13px;
            color: var(--color-text-secondary);
            white-space: nowrap;
        }

        .url-input-group input {
            padding: 8px 12px;
            background: var(--color-bg-primary);
            border: 1px solid var(--color-border);
            color: var(--color-text-primary);
            border-radius: 4px;
            font-size: 13px;
            min-width: 250px;
        }

        .url-input-group input:focus {
            outline: none;
            border-color: #85B7EB;
        }

        .add-session-btn {
            padding: 8px 16px;
            background: #85B7EB;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
        }

        .add-session-btn:hover {
            background: #6da3d5;
        }

        /* Session grid */
        .sessions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        /* Session card */
        .session-card {
            background: var(--color-bg-secondary);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            border-top: 4px solid;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .session-card-header {
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--color-border);
            background: rgba(0, 0, 0, 0.3);
        }

        .session-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--color-text-secondary);
            letter-spacing: 0.5px;
        }

        .session-remove {
            background: none;
            border: none;
            color: var(--color-text-secondary);
            cursor: pointer;
            font-size: 18px;
            padding: 0;
            line-height: 1;
        }

        .session-remove:hover {
            color: var(--color-error);
        }

        .session-content {
            padding: 15px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* Status indicator */
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
            font-size: 13px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .status-dot.idle {
            background: #999;
        }

        .status-dot.logged-in {
            background: var(--color-success);
        }

        .status-dot.expired {
            background: var(--color-error);
        }

        /* Login form */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }

        .login-form input {
            padding: 10px;
            background: var(--color-bg-primary);
            border: 1px solid var(--color-border);
            color: var(--color-text-primary);
            border-radius: 4px;
            font-size: 12px;
        }

        .login-form input::placeholder {
            color: var(--color-text-secondary);
        }

        .login-form input:focus {
            outline: none;
            border-color: #85B7EB;
        }

        .login-btn {
            padding: 10px;
            background: #85B7EB;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }

        .login-btn:hover {
            background: #6da3d5;
        }

        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* User info */
        .user-info {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--color-border);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 13px;
            flex-shrink: 0;
        }

        .user-details {
            flex: 1;
            min-width: 0;
        }

        .user-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--color-text-primary);
        }

        .user-email {
            font-size: 12px;
            color: var(--color-text-secondary);
            word-break: break-all;
        }

        /* Token display */
        .token-section {
            margin-bottom: 15px;
        }

        .token-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--color-text-secondary);
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .token-display {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .token-value {
            flex: 1;
            font-size: 11px;
            color: var(--color-text-primary);
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 8px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            word-break: break-all;
            max-height: 30px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .token-badge {
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 600;
            white-space: nowrap;
        }

        .token-badge.valid {
            background: #5DCAA5;
            color: white;
        }

        .token-badge.expired {
            background: var(--color-error);
            color: white;
        }

        .token-expiry {
            font-size: 11px;
            color: var(--color-text-secondary);
            text-align: right;
        }

        /* Action buttons */
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 15px;
        }

        .action-btn {
            padding: 8px 12px;
            border: 1px solid var(--color-border);
            background: transparent;
            color: var(--color-text-primary);
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .action-btn:hover:not(:disabled) {
            background: var(--color-bg-primary);
            border-color: var(--color-text-primary);
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .action-btn.logout {
            color: var(--color-error);
            border-color: var(--color-error);
        }

        .action-btn.logout:hover:not(:disabled) {
            background: rgba(240, 153, 123, 0.1);
        }

        .action-btn.refresh {
            color: var(--color-success);
            border-color: var(--color-success);
        }

        .action-btn.refresh:hover:not(:disabled) {
            background: rgba(93, 202, 165, 0.1);
        }

        /* Activity log */
        .activity-log {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            padding: 8px;
            max-height: 120px;
            overflow-y: auto;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            border: 1px solid var(--color-border);
        }

        .log-entry {
            padding: 4px 0;
            color: var(--color-text-secondary);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-time {
            color: var(--color-text-secondary);
        }

        .log-message {
            color: var(--color-text-primary);
        }

        .log-entry.success .log-message {
            color: var(--color-success);
        }

        .log-entry.error .log-message {
            color: var(--color-error);
        }

        /* Scrollbar styling */
        .activity-log::-webkit-scrollbar {
            width: 4px;
        }

        .activity-log::-webkit-scrollbar-track {
            background: transparent;
        }

        .activity-log::-webkit-scrollbar-thumb {
            background: var(--color-border);
            border-radius: 2px;
        }

        .activity-log::-webkit-scrollbar-thumb:hover {
            background: var(--color-text-secondary);
        }

        /* Add session placeholder */
        .add-session-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 360px;
            border: 2px dashed var(--color-border);
            border-radius: 8px;
            color: var(--color-text-secondary);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .add-session-placeholder:hover {
            border-color: #85B7EB;
            color: #85B7EB;
        }

        /* Disabled state message */
        .disabled-message {
            text-align: center;
            padding: 15px;
            color: var(--color-text-secondary);
            font-size: 12px;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .sessions-grid {
                grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .top-bar {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .top-bar-controls {
                flex-direction: column;
                gap: 10px;
                width: 100%;
            }

            .url-input-group {
                width: 100%;
            }

            .url-input-group input {
                min-width: unset;
                flex: 1;
            }

            .add-session-btn {
                width: 100%;
            }

            .sessions-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Top bar -->
    <div class="top-bar">
        <h1>Auth session tester</h1>
        <div class="top-bar-controls">
            <div class="url-input-group">
                <label for="baseUrl">Base URL</label>
                <input 
                    type="text" 
                    id="baseUrl" 
                    placeholder="http://localhost:3000"
                    value="http://localhost:3000"
                >
            </div>
            <button class="add-session-btn" onclick="addSession()">+ add session</button>
        </div>
    </div>

    <!-- Sessions grid -->
    <div class="sessions-grid" id="sessionsGrid"></div>

    <script>
        // ========== CONFIGURATION ==========
        const PALETTE = [
            "#85B7EB",  // blue
            "#5DCAA5",  // teal
            "#F0997B",  // coral
            "#AFA9EC",  // purple
            "#FAC775",  // amber
            "#ED93B1",  // pink
        ];

        // ========== STATE ==========
        let sessions = [];
        let sessionCounter = 0;

        // ========== INITIALIZATION ==========
        function initializeApp() {
            loadBaseUrl();
            addSession();
            startExpiryCountdown();
        }

        function loadBaseUrl() {
            const saved = localStorage.getItem('baseUrl');
            if (saved) {
                document.getElementById('baseUrl').value = saved;
            }
        }

        document.getElementById('baseUrl').addEventListener('change', (e) => {
            localStorage.setItem('baseUrl', e.target.value);
        });

        // ========== SESSION MANAGEMENT ==========
        function createSession() {
            const color = PALETTE[sessions.length % PALETTE.length];
            return {
                id: `session-${++sessionCounter}`,
                color,
                email: '',
                password: '',
                status: 'idle', // idle | logged-in | expired
                accessToken: null,
                refreshToken: null,
                decodedAccess: null,
                decodedRefresh: null,
                user: null,
                log: []
            };
        }

        function addSession() {
            const session = createSession();
            sessions.push(session);
            renderSession(session);
        }

        function removeSession(sessionId) {
            sessions = sessions.filter(s => s.id !== sessionId);
            const card = document.getElementById(`card-${sessionId}`);
            if (card) card.remove();
        }

        // ========== JWT DECODING ==========
        function decodeJwt(token) {
            try {
                const payload = token.split(".")[1];
                const decoded = JSON.parse(atob(payload.replace(/-/g, "+").replace(/_/g, "/")));
                return decoded;
            } catch {
                return null;
            }
        }

        // ========== API CALLS ==========
        function getBaseUrl() {
            return document.getElementById('baseUrl').value.replace(/\/$/, '');
        }

        async function apiCall(session, method, path, body) {
            const baseUrl = getBaseUrl();
            const url = `${baseUrl}/api/account${path}`;
            const headers = { "Content-Type": "application/json" };

            if (session.accessToken) {
                headers["Authorization"] = `Bearer ${session.accessToken}`;
            }

            try {
                const res = await fetch(url, {
                    method,
                    headers,
                    body: body ? JSON.stringify(body) : undefined
                });

                const data = await res.json();
                const logType = res.ok ? 'success' : 'error';
                logEntry(session, `${method} ${path} → ${res.status}`, logType);
                
                return { ok: res.ok, status: res.status, data };
            } catch (error) {
                logEntry(session, `${method} ${path} → Error: ${error.message}`, 'error');
                return { ok: false, status: 0, data: null };
            }
        }

        async function login(session) {
            const result = await apiCall(session, 'POST', '/login', {
                email: session.email,
                password: session.password
            });

            if (result.ok && result.data) {
                session.accessToken = result.data.token;
                session.refreshToken = result.data.refreshToken;
                session.decodedAccess = decodeJwt(result.data.token);
                session.decodedRefresh = decodeJwt(result.data.refreshToken);

                // Fetch user info
                const meResult = await apiCall(session, 'POST', '/me', {});
                if (meResult.ok && meResult.data) {
                    session.user = meResult.data;
                    session.status = 'logged-in';
                }
                
                renderSession(session);
            }
        }

        async function logout(session) {
            const result = await apiCall(session, 'POST', '/logout', {
                refreshToken: session.refreshToken
            });

            if (result.ok) {
                session.accessToken = null;
                session.refreshToken = null;
                session.decodedAccess = null;
                session.decodedRefresh = null;
                session.user = null;
                session.status = 'idle';
                renderSession(session);
            }
        }

        async function logoutAll(session) {
            const result = await apiCall(session, 'POST', '/logout-all', {
                token: session.accessToken
            });

            if (result.ok) {
                session.accessToken = null;
                session.refreshToken = null;
                session.decodedAccess = null;
                session.decodedRefresh = null;
                session.user = null;
                session.status = 'idle';
                renderSession(session);
            }
        }

        async function refresh(session) {
            const result = await apiCall(session, 'POST', '/refresh', {
                token: session.accessToken,
                refreshToken: session.refreshToken
            });

            if (result.ok && result.data) {
                session.accessToken = result.data.token;
                session.decodedAccess = decodeJwt(result.data.token);
                session.status = 'logged-in';
                renderSession(session);
            }
        }

        async function getMe(session) {
            const result = await apiCall(session, 'POST', '/me', {});
            if (result.ok && result.data) {
                session.user = result.data;
                renderSession(session);
            }
        }

        // ========== LOGGING ==========
        function logEntry(session, message, type = 'info') {
            const now = new Date();
            const time = now.toLocaleTimeString('en-US', { 
                hour12: false,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });

            session.log.unshift({ time, message, type });
            if (session.log.length > 15) {
                session.log.pop();
            }

            renderSessionLog(session);
        }

        // ========== EXPIRY MANAGEMENT ==========
        function getExpiryInfo(decodedToken) {
            if (!decodedToken || !decodedToken.exp) {
                return { status: 'unknown', remaining: 0, text: 'Unknown' };
            }

            const now = Math.floor(Date.now() / 1000);
            const remaining = decodedToken.exp - now;

            if (remaining <= 0) {
                return { status: 'expired', remaining: 0, text: 'Expired' };
            }

            const hours = Math.floor(remaining / 3600);
            const minutes = Math.floor((remaining % 3600) / 60);
            const seconds = remaining % 60;

            let text = '';
            if (hours > 0) text = `${hours}h ${minutes}m`;
            else if (minutes > 0) text = `${minutes}m ${seconds}s`;
            else text = `${seconds}s`;

            return { status: 'valid', remaining, text };
        }

        function startExpiryCountdown() {
            setInterval(() => {
                sessions.forEach(session => {
                    if (session.decodedAccess) {
                        const info = getExpiryInfo(session.decodedAccess);
                        if (info.status === 'expired' && session.status !== 'expired') {
                            session.status = 'expired';
                        }
                        renderSessionTokens(session);
                    }
                });
            }, 1000);
        }

        // ========== RENDERING ==========
        function renderSession(session) {
            let card = document.getElementById(`card-${session.id}`);
            
            if (!card) {
                card = document.createElement('div');
                card.id = `card-${session.id}`;
                card.className = 'session-card';
                document.getElementById('sessionsGrid').appendChild(card);
            }

            card.style.borderTopColor = session.color;
            card.innerHTML = renderSessionHTML(session);
        }

        function renderSessionHTML(session) {
            const statusText = {
                'idle': 'Not logged in',
                'logged-in': 'Logged in',
                'expired': 'Token expired'
            }[session.status];

            const statusClass = {
                'idle': 'idle',
                'logged-in': 'logged-in',
                'expired': 'expired'
            }[session.status];

            return `
                <div class="session-card-header">
                    <div class="session-label">SESSION ${session.id.split('-')[1].toUpperCase()}</div>
                    <button class="session-remove" onclick="removeSession('${session.id}')">✕</button>
                </div>
                <div class="session-content">
                    <div class="status-indicator">
                        <span class="status-dot ${statusClass}"></span>
                        <span>${statusText}</span>
                    </div>

                    ${session.status === 'idle' ? renderLoginForm(session) : renderLoggedInContent(session)}

                    ${renderActionButtons(session)}

                    <div class="activity-log" id="log-${session.id}">
                        ${renderActivityLog(session)}
                    </div>
                </div>
            `;
        }

        function renderLoginForm(session) {
            return `
                <div class="login-form">
                    <input 
                        type="email" 
                        placeholder="user@example.com"
                        value="${session.email}"
                        onchange="updateSessionField('${session.id}', 'email', this.value)"
                    >
                    <input 
                        type="password" 
                        placeholder="••••••••"
                        value="${session.password}"
                        onchange="updateSessionField('${session.id}', 'password', this.value)"
                    >
                    <button class="login-btn" onclick="login(getSession('${session.id}'))">Login</button>
                </div>
            `;
        }

        function renderLoggedInContent(session) {
            if (!session.user) return '';

            const initials = ((session.user.firstName?.[0] || '') + (session.user.lastName?.[0] || '')).toUpperCase() || '?';

            return `
                <div class="user-info">
                    <div class="user-avatar" style="background: ${session.color};">
                        ${initials}
                    </div>
                    <div class="user-details">
                        <div class="user-name">${session.user.firstName} ${session.user.lastName}</div>
                        <div class="user-email">${session.user.email}</div>
                    </div>
                </div>

                <div class="token-section">
                    <div class="token-label">Access Token</div>
                    ${renderToken(session.accessToken, session.decodedAccess, 'access')}
                </div>

                <div class="token-section">
                    <div class="token-label">Refresh Token</div>
                    ${renderToken(session.refreshToken, session.decodedRefresh, 'refresh')}
                </div>
            `;
        }

        function renderToken(token, decoded, type) {
            if (!token) return '<div class="disabled-message">No token</div>';

            const info = getExpiryInfo(decoded);
            const display = token.substring(0, 20) + '…';

            return `
                <div class="token-display">
                    <div class="token-value" title="${token}">${display}</div>
                    <span class="token-badge ${info.status}">${info.status === 'valid' ? 'Valid' : 'Expired'}</span>
                </div>
                <div class="token-expiry" id="expiry-${type}">exp: ${info.text}</div>
            `;
        }

        function renderActionButtons(session) {
            const isLoggedIn = session.status === 'logged-in';
            
            return `
                <div class="action-buttons">
                    <button 
                        class="action-btn ${isLoggedIn ? '' : 'disabled'}" 
                        onclick="getMe(getSession('${session.id}'))"
                        ${!isLoggedIn ? 'disabled' : ''}
                    >/me</button>
                    <button 
                        class="action-btn refresh ${isLoggedIn ? '' : 'disabled'}" 
                        onclick="refresh(getSession('${session.id}'))"
                        ${!isLoggedIn ? 'disabled' : ''}
                    >Refresh ↑</button>
                    <button 
                        class="action-btn logout ${isLoggedIn ? '' : 'disabled'}" 
                        onclick="logout(getSession('${session.id}'))"
                        ${!isLoggedIn ? 'disabled' : ''}
                    >Logout</button>
                    <button 
                        class="action-btn logout ${isLoggedIn ? '' : 'disabled'}" 
                        onclick="logoutAll(getSession('${session.id}'))"
                        ${!isLoggedIn ? 'disabled' : ''}
                    >Logout all</button>
                </div>
            `;
        }

        function renderActivityLog(session) {
            if (session.log.length === 0) {
                return '<div class="log-entry">No activity yet</div>';
            }

            return session.log
                .map(entry => `
                    <div class="log-entry ${entry.type}">
                        <span class="log-time">${entry.time}</span>
                        <span class="log-message">  ${entry.message}</span>
                    </div>
                `)
                .join('');
        }

        function renderSessionLog(session) {
            const logElement = document.getElementById(`log-${session.id}`);
            if (logElement) {
                logElement.innerHTML = renderActivityLog(session);
            }
        }

        function renderSessionTokens(session) {
            const card = document.getElementById(`card-${session.id}`);
            if (card) {
                const logElement = document.getElementById(`log-${session.id}`);
                if (logElement) {
                    renderSession(session);
                }
            }
        }

        // ========== UTILITIES ==========
        function getSession(sessionId) {
            return sessions.find(s => s.id === sessionId);
        }

        function updateSessionField(sessionId, field, value) {
            const session = getSession(sessionId);
            if (session) {
                session[field] = value;
            }
        }

        // ========== START APP ==========
        initializeApp();
    </script>
